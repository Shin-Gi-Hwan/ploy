# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — PRODUCTION stack
#
# Usage:
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#   docker compose --env-file .env.prod -f docker-compose.prod.yml down
#   docker compose --env-file .env.prod -f docker-compose.prod.yml logs -f backend
#
# Security posture:
#   - MySQL port NOT exposed externally (internal Docker network only)
#   - Backend port NOT exposed externally (proxied through nginx)
#   - Frontend exposed on port 3000 (host nginx Certbot proxies 443→3000)
#   - Uploaded files stored on a named Docker volume (survives redeploys)
#
# Future services (uncomment as added):
#   redis, rabbitmq, minio, certbot
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: ploy-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    # NO ports: section — MySQL is internal only in production
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped
    networks:
      - ploy-internal

  # ── Backend (Spring Boot) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ploy-backend-prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_MS: ${JWT_EXPIRY_MS}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL}
      STORAGE_PATH: /data/uploads
      OAUTH2_REDIRECT_BASE_URL: ${OAUTH2_REDIRECT_BASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
    volumes:
      - uploads_prod:/data/uploads
    # NO ports: section — traffic reaches backend only through nginx
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ploy-internal

  # ── Frontend (nginx reverse proxy + SPA) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ploy-frontend-prod
    ports:
      - "3000:80"   # host nginx (Certbot) proxies 443 → localhost:3000
    # volumes:
    #   Uncomment when SSL is configured:
    #   - ./nginx/ssl:/etc/nginx/ssl:ro
    #   - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ploy-internal

  # ── Future: Redis ──────────────────────────────────────────────────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: ploy-redis-prod
  #   command: redis-server --requirepass ${REDIS_PASSWORD}
  #   volumes:
  #     - redis_prod_data:/data
  #   restart: unless-stopped
  #   networks:
  #     - ploy-internal

  # ── Future: RabbitMQ ───────────────────────────────────────────────────────
  # rabbitmq:
  #   image: rabbitmq:3-management-alpine
  #   container_name: ploy-rabbitmq-prod
  #   environment:
  #     RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
  #     RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
  #   volumes:
  #     - rabbitmq_prod_data:/var/lib/rabbitmq
  #   restart: unless-stopped
  #   networks:
  #     - ploy-internal

  # ── Future: MinIO (object storage) ────────────────────────────────────────
  # minio:
  #   image: minio/minio:latest
  #   container_name: ploy-minio-prod
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
  #     MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
  #   volumes:
  #     - minio_prod_data:/data
  #   restart: unless-stopped
  #   networks:
  #     - ploy-internal

  # ── Future: Certbot (SSL renewal) ─────────────────────────────────────────
  # certbot:
  #   image: certbot/certbot
  #   container_name: ploy-certbot
  #   volumes:
  #     - ./nginx/ssl:/etc/letsencrypt
