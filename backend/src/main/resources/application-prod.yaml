# ──────────────────────────────────────────────────────────────────────────────
# application-prod.yaml — PRODUCTION overrides
#
# Activated by: SPRING_PROFILES_ACTIVE=prod
#
# Design goals:
#   - No env var defaults — every secret must be explicitly provided
#   - DDL validate (never auto-alter production schema)
#   - Minimal SQL logging (performance + log hygiene)
#   - HikariCP pool tuned for a single-instance VPS
#   - Structured for future Redis / RabbitMQ / MinIO additions
# ──────────────────────────────────────────────────────────────────────────────

spring:
  # ── Database ────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP connection pool — tuned for a modest VPS (2–4 vCPU)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000    # 30 s
      idle-timeout: 600000         # 10 min
      max-lifetime: 1800000        # 30 min
      pool-name: PloyHikariPool

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Validate schema; NEVER auto-alter in prod
    show-sql: false
    open-in-view: false           # Prevent lazy-load anti-pattern in prod
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.prod.ploy: INFO
    org.springframework.security: WARN

# ── Future infrastructure stubs ───────────────────────────────────────────────
