# ──────────────────────────────────────────────────────────────────────────────
# application.yaml — COMMON / SHARED configuration
# Profile-specific overrides live in:
#   application-dev.yaml   (local development)
#   application-prod.yaml  (production VPS)
#
# Active profile is selected via:
#   Environment variable:  SPRING_PROFILES_ACTIVE=dev   (Docker / CI)
#   VM option:             -Dspring.profiles.active=dev  (IntelliJ)
# ──────────────────────────────────────────────────────────────────────────────

spring:
  application:
    name: ploy

  # ── File upload limits ──────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 22MB

  # ── Email (Resend SMTP) ─────────────────────────────────────────────────────
  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

# ── Ploy custom properties ────────────────────────────────────────────────────
spring:
  security:
    oauth2:
      client:
        registration:
          # ── Google (built-in provider) ──────────────────────────────────────────
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
            redirect-uri: "${ploy.oauth2.redirect-base-url}/api/auth/oauth2/callback/{registrationId}"

          # ── Naver (custom provider) ─────────────────────────────────────────────
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "${ploy.oauth2.redirect-base-url}/api/auth/oauth2/callback/{registrationId}"
            scope: name, email
            client-name: Naver

          # ── Kakao (custom provider) ─────────────────────────────────────────────
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET:}   # Kakao client secret is optional
            authorization-grant-type: authorization_code
            redirect-uri: "${ploy.oauth2.redirect-base-url}/api/auth/oauth2/callback/{registrationId}"
            scope: profile_nickname, account_email
            client-name: Kakao
            client-authentication-method: client_secret_post

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response   # Naver wraps user info in "response"

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id         # Kakao numeric user ID

ploy:
  oauth2:
    # Set this to https://ploy.co.kr in production, http://localhost:5173 in dev
    redirect-base-url: ${OAUTH2_REDIRECT_BASE_URL:http://localhost:5173}

  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}

  mail:
    from: ${MAIL_FROM:noreply@ploy.kr}
    admin-address: ${ADMIN_EMAIL}

  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  storage:
    path: ${STORAGE_PATH:uploads}

  jwt:
    secret: ${JWT_SECRET}
    expiry-ms: ${JWT_EXPIRY_MS:604800000}   # default: 7 days
